<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Central Asia · August 2026</title>
    <meta name="theme-color" content="#0e1116" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Central Asia" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script>
      // Lock content until decryption succeeds. We always start locked —
      // even cached passwords still need to decrypt the data blob.
      document.documentElement.classList.add("locked");
      // Inject style.css with a cache-busting query so CSS edits land on
      // next reload instead of being held by the browser/Pages cache.
      (function () {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = "style.css?v=" + Date.now();
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div id="gate">
      <div class="gate-card">
        <div class="gate-mark">CA</div>
        <div class="gate-title">Central Asia · Aug 2026</div>
        <div class="gate-sub">Enter password to continue</div>
        <form id="gate-form" autocomplete="off">
          <input
            id="gate-input"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            autofocus
          />
          <button type="submit">Unlock</button>
        </form>
        <div class="gate-err" id="gate-err"></div>
      </div>
    </div>
    <script>
      // AES-256-GCM decryption gate. Encrypted blob is fetched at runtime with
      // no-cache so trip-data updates show on next page load (no HTTP caching).
      async function fetchEncryptedBlob() {
        const resp = await fetch("data.enc.json?t=" + Date.now(), {
          cache: "no-store",
        });
        if (!resp.ok) throw new Error("encrypted blob unavailable");
        return resp.json();
      }

      async function decryptTripData(password) {
        const { blob: b64, iter } = await fetchEncryptedBlob();
        const bytes = Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));
        const salt = bytes.slice(0, 16);
        const iv = bytes.slice(16, 28);
        const tag = bytes.slice(28, 44);
        const ct = bytes.slice(44);
        // Web Crypto AES-GCM wants ciphertext || tag
        const ctWithTag = new Uint8Array(ct.length + tag.length);
        ctWithTag.set(ct);
        ctWithTag.set(tag, ct.length);

        const baseKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          { name: "PBKDF2" },
          false,
          ["deriveKey"],
        );
        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt,
            iterations: iter || 200000,
            hash: "SHA-256",
          },
          baseKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          key,
          ctWithTag,
        );
        return JSON.parse(new TextDecoder().decode(plain));
      }

      const form = document.getElementById("gate-form");
      const input = document.getElementById("gate-input");
      const err = document.getElementById("gate-err");
      const btn = form.querySelector("button");

      // app.js may not have loaded yet when decryption finishes — wait for it.
      function waitForStartApp() {
        return new Promise((resolve) => {
          if (typeof window.startApp === "function") return resolve();
          const tick = () => {
            if (typeof window.startApp === "function") resolve();
            else setTimeout(tick, 20);
          };
          tick();
        });
      }

      async function tryUnlock(password) {
        err.textContent = "";
        btn.disabled = true;
        btn.textContent = "Unlocking…";
        try {
          const data = await decryptTripData(password);
          window.STOPS = data.STOPS;
          window.LOGISTICS = data.LOGISTICS;
          window.WALLET = data.WALLET || [];
          // localStorage (not session) so the installed PWA unlocks instantly
          try { localStorage.setItem("trip-pw", password); } catch (e) {}
          await waitForStartApp();
          document.documentElement.classList.remove("locked");
          document.getElementById("gate").remove();
          window.startApp();
          setTimeout(() => window.dispatchEvent(new Event("resize")), 50);
        } catch (e) {
          btn.disabled = false;
          btn.textContent = "Unlock";
          err.textContent = "Nope. Try again.";
          input.select();
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        tryUnlock(input.value.trim());
      });

      // Auto-unlock with cached password (migrate old sessionStorage copy too)
      const cached = (() => {
        try {
          return (
            localStorage.getItem("trip-pw") || sessionStorage.getItem("trip-pw")
          );
        } catch (e) {
          return null;
        }
      })();
      if (cached) tryUnlock(cached);

      // PWA: register service worker for offline use. update() forces an
      // update check on every launch (iOS PWAs can be lazy about this).
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("sw.js")
          .then((reg) => reg.update().catch(() => {}))
          .catch(() => {});
        // When a new version of the shell takes over, reload once so the
        // user immediately runs the fresh code instead of the stale cache.
        let reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloaded) return;
          reloaded = true;
          location.reload();
        });
      }
      window.addEventListener("offline", () =>
        document.getElementById("offline-banner").classList.add("show"),
      );
      window.addEventListener("online", () =>
        document.getElementById("offline-banner").classList.remove("show"),
      );
    </script>

    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">CA</div>
        <div>
          <div class="brand-title">Central Asia · Aug 2026</div>
          <div class="brand-sub">
            Almaty → Tashkent → Samarkand → Bukhara → Dushanbe →
            <span class="hl">Pamir Highway</span> → Osh
          </div>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab" data-tab="wallet">Wallet</button>
        <button class="tab active" data-tab="map">Map</button>
        <button class="tab" data-tab="itinerary">Itinerary</button>
        <button class="tab" data-tab="logistics">
          Logistics <span class="badge" id="logistics-count">0</span>
        </button>
      </nav>
      <div class="progress-wrap" title="Logistics resolved">
        <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">0 / 0</div>
      </div>
    </header>

    <main>
      <!-- MAP TAB -->
      <section class="panel-map view active" data-view="map">
        <aside class="sidebar" id="day-list"></aside>
        <div id="map"></div>
        <div class="detail" id="detail">
          <button class="detail-close" id="detail-close" aria-label="Close">×</button>
          <div id="detail-body"></div>
        </div>
      </section>

      <!-- ITINERARY TAB -->
      <section class="view" data-view="itinerary">
        <div class="timeline" id="timeline"></div>
      </section>

      <!-- LOGISTICS TAB -->
      <section class="view" data-view="logistics">
        <div class="logistics" id="logistics"></div>
      </section>

      <!-- WALLET TAB -->
      <section class="view" data-view="wallet">
        <div class="wallet" id="wallet"></div>
      </section>
    </main>

    <div id="offline-banner">Offline — showing saved data</div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
